name: Run Bot Script Periodically

on:
  # 1. التشغيل اليدوي متى ما أردت من زر في موقع جيت هب
  workflow_dispatch:
    
  # 2. التشغيل التلقائي المؤقت (مثلاً كل 6 ساعات يتم تجديد وتشغيل الخادم لوحده)
  schedule:
    - cron: '0 */6 * * *'  # يتفعل كل 6 ساعات تلقائياً

jobs:
  run-script:
    runs-on: ubuntu-latest  # خادم مجاني مؤقت يعطيك إياه جيت هب وقت التنفيذ

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install FFmpeg (ضروري لتحويل الصوت والفيديو)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python Script
      run: |
        python app.py
