name: Run Python Script

# تحديد متى يعمل هذا الأكشن (مثلاً: عند عمل Push للمستودع، أو يدوياً)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك زر تشغيل يدوي من موقع جيت هب مباشرة

jobs:
  build:
    runs-on: ubuntu-latest # البيئة التي سيعمل عليها السيرفر (لينكس مجاني)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script
      run: |
        python app.py
